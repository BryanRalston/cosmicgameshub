  <title>Memory Match вҖ” Cosmic Card Game | CosmicGamesHub</title>

  <style>
    .mm-wrap { display:flex; flex-direction:column; align-items:center; padding:1.25rem 0 3rem; gap:1rem; }
    .mm-stats { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .mm-stat { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.5rem 1.1rem; text-align:center; min-width:80px; }
    .mm-stat__val   { font-size:1.4rem; font-weight:800; color:var(--accent); line-height:1; font-variant-numeric:tabular-nums; }
    .mm-stat__label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-lo); }

    #cardGrid { display:grid; gap:0.5rem; max-width:min(560px,95vw); }
    .card { aspect-ratio:1; perspective:600px; cursor:pointer; }
    .card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.4s cubic-bezier(.4,0,.2,1); border-radius:8px; }
    .card.flipped .card-inner, .card.matched .card-inner { transform:rotateY(180deg); }
    .card-front, .card-back { position:absolute; inset:0; border-radius:8px; display:flex; align-items:center; justify-content:center; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    .card-front { background:var(--bg-card); border:1px solid rgba(0,212,255,0.15); font-size:clamp(1.4rem,5vw,2.2rem); }
    .card-back  { background:linear-gradient(135deg,#0a0a1a,#101028); border:1px solid rgba(0,212,255,0.25); transform:rotateY(180deg); font-size:clamp(1.4rem,5vw,2.2rem); }
    .card-front::after { content:'вӯҗ'; opacity:0.08; font-size:1.5rem; }
    .card.matched .card-back { border-color:rgba(0,230,118,0.5); background:linear-gradient(135deg,rgba(0,230,118,0.08),rgba(0,212,255,0.08)); }
    .card:hover:not(.flipped):not(.matched) .card-front { border-color:rgba(0,212,255,0.4); background:var(--bg-raised); }

    .win-panel { display:none; background:var(--bg-card); border:1px solid var(--border-mid); border-radius:var(--radius-lg); padding:2rem; text-align:center; max-width:400px; }
    .win-panel.show { display:block; }
    .mm-best { font-size:0.8rem; color:var(--text-lo); margin:0.25rem 0 1rem; }
    .mm-best span { color:var(--accent); font-weight:700; }
    .btn-share { background:transparent; border:1px solid rgba(255,255,255,0.15); color:var(--text-mid); border-radius:var(--radius-sm); padding:0.45rem 1rem; font-size:0.82rem; cursor:pointer; font-family:inherit; transition:all 0.15s; margin-left:0.5rem; }
    .btn-share:hover { border-color:var(--accent); color:var(--accent); }
    .theme-row { display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center; }
    .theme-btn { background:var(--bg-card); border:1px solid var(--border); border-radius:999px; padding:0.3rem 0.8rem; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:inherit; color:var(--text-mid); transition:all 0.15s; }
    .theme-btn:hover { border-color:var(--border-mid); color:var(--text-hi); }
    .theme-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
    .size-row { display:flex; gap:0.4rem; justify-content:center; }
    .size-btn { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.3rem 0.8rem; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:inherit; color:var(--text-mid); transition:all 0.15s; }
    .size-btn:hover { border-color:var(--border-mid); color:var(--text-hi); }
    .size-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  </style>
</head>
<body>
<nav class="nav">
  <div class="container">
    <div class="nav__inner">
      <a href="/" class="nav__logo"><span class="nav__logo-icon">рҹҺ®</span><span class="nav__logo-text">Cosmic<span>Games</span>Hub</span></a>
      <ul class="nav__links" id="navLinks">
        <li><a href="/games/sudoku">Sudoku</a></li>
        <li><a href="/games/minesweeper">Minesweeper</a></li>
        <li><a href="/games/memory-match" class="active">Memory Match</a></li>
        <li><a href="/tools/aim-trainer">Aim Trainer</a></li>
        <li><a href="/tools/reaction-time-test">Reaction Test</a></li>
      </ul>
      <button class="nav__hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <div style="padding:1.5rem 0 0.75rem;text-align:center;">
      <span class="section__eyebrow">Memory Game</span>
      <h1 style="margin-top:0.4rem;margin-bottom:0.25rem;">рҹғҸ Memory Match</h1>
      <p style="color:var(--text-mid);font-size:0.9rem;">Flip cards to find all matching pairs in as few moves as possible.</p>
    </div>

    <div class="mm-wrap">
      <div style="display:flex;flex-direction:column;gap:0.6rem;align-items:center;width:100%;">
        <div class="theme-row">
          <button class="theme-btn active" data-theme="cosmic">рҹҢҢ Cosmic</button>
          <button class="theme-btn" data-theme="gaming">рҹҺ® Gaming</button>
          <button class="theme-btn" data-theme="animals">рҹҗҫ Animals</button>
          <button class="theme-btn" data-theme="food">рҹҚ• Food</button>
        </div>
        <div class="size-row">
          <button class="size-btn active" data-size="4x4">4Г—4 (Easy)</button>
          <button class="size-btn" data-size="4x5">4Г—5 (Med)</button>
          <button class="size-btn" data-size="5x6">5Г—6 (Hard)</button>
        </div>
      </div>

      <div class="mm-stats">
        <div class="mm-stat"><div class="mm-stat__val" id="movesDisp">0</div><div class="mm-stat__label">Moves</div></div>
        <div class="mm-stat"><div class="mm-stat__val" id="pairsDisp">0</div><div class="mm-stat__label">Pairs</div></div>
        <div class="mm-stat"><div class="mm-stat__val" id="timerDisp">0:00</div><div class="mm-stat__label">Time</div></div>
        <button class="btn btn--outline" onclick="startGame()" style="padding:0.4rem 1rem;font-size:0.85rem;align-self:center;">New Game</button>
      </div>

      <div id="cardGrid"></div>

      <div class="win-panel" id="winPanel">
        <div style="font-size:2.5rem;margin-bottom:0.5rem;">рҹҸҶ</div>
        <h2 style="color:#00e676;margin-bottom:0.5rem;">All Pairs Found!</h2>
        <p id="winMsg" style="color:var(--text-mid);margin-bottom:0.25rem;"></p>
        <p class="mm-best" id="winBest"></p>
        <button class="btn btn--primary" onclick="startGame()">Play Again</button>
        <button class="btn-share" id="mmShareBtn" onclick="mmShare()">рҹ“Ӣ Share</button>
      </div>
    </div>
  </div>
</main>

<footer class="footer"><div class="container"><div class="footer__bottom">
  <p class="footer__legal">В© 2026 CosmicGamesHub.</p>
</div></div></footer>

<script>
const THEMES = {
  cosmic: ['рҹҢҢ','вҳ„пёҸ','рҹҢ ','рҹӘҗ','вӯҗ','рҹҢҷ','рҹҡҖ','рҹҢҹ','рҹ’«','рҹӣё','рҹ”ӯ','рҹҢһ','рҹӘЁ','рҹ’Ҙ','рҹҢҲ'],
  gaming: ['рҹҺ®','рҹ•№пёҸ','рҹҸҶ','вҡ”пёҸ','рҹӣЎпёҸ','рҹҺҜ','рҹғҸ','рҹҺІ','рҹ‘ҫ','рҹ’Ј','рҹ”«','рҹ—ЎпёҸ','рҹ’Һ','рҹ§©','рҹҺӘ'],
  animals:['рҹҰҒ','рҹҗҜ','рҹҰҠ','рҹҗә','рҹҰқ','рҹҗё','рҹҰӢ','рҹҗ¬','рҹҰҲ','рҹҰ…','рҹҗҷ','рҹҰ„','рҹҗІ','рҹҰ–','рҹҰ©'],
  food:   ['рҹҚ•','рҹҚ”','рҹҢ®','рҹҚң','рҹҚЈ','рҹҚҰ','рҹҺӮ','рҹҚ©','рҹҘ‘','рҹҚҮ','рҹҢҪ','рҹҚ“','рҹҘҰ','рҹҚӢ','рҹҘҗ'],
};
const SIZES = { '4x4':{cols:4,rows:4}, '4x5':{cols:4,rows:5}, '5x6':{cols:5,rows:6} };

let cards=[], flipped=[], moves=0, pairs=0, totalPairs=0, locked=false, timerSec=0, timerInt=null, started=false;
let theme='cosmic', gridSize='4x4';

function startGame() {
  clearInterval(timerInt); timerSec=0; moves=0; pairs=0; flipped=[]; locked=false; started=false;
  document.getElementById('movesDisp').textContent='0';
  document.getElementById('pairsDisp').textContent='0';
  document.getElementById('timerDisp').textContent='0:00';
  document.getElementById('winPanel').classList.remove('show');

  const {cols,rows}=SIZES[gridSize];
  const total=cols*rows; totalPairs=total/2;
  document.getElementById('pairsDisp').parentElement.querySelector('.mm-stat__label').textContent=`/ ${totalPairs} Pairs`;

  const pool=[...THEMES[theme]].slice(0,totalPairs);
  const deck=shuffle([...pool,...pool]);
  cards=deck.map((sym,i)=>({id:i,sym,matched:false,flipped:false}));

  const grid=document.getElementById('cardGrid');
  const cardSize=Math.min(Math.floor((Math.min(window.innerWidth-32,560)-((cols-1)*8))/cols),90);
  grid.style.gridTemplateColumns=`repeat(${cols},${cardSize}px)`;
  grid.innerHTML='';

  cards.forEach((card,i)=>{
    const el=document.createElement('div');
    el.className='card'; el.style.width=el.style.height=cardSize+'px';
    el.innerHTML=`<div class="card-inner"><div class="card-front"></div><div class="card-back">${card.sym}</div></div>`;
    el.addEventListener('click',()=>flipCard(i,el));
    grid.appendChild(el);
    card.el=el;
  });
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function flipCard(i,el){
  if(locked||cards[i].matched||cards[i].flipped) return;
  if(!started){ started=true; timerInt=setInterval(()=>{timerSec++;const m=Math.floor(timerSec/60),s=timerSec%60;document.getElementById('timerDisp').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000); }
  cards[i].flipped=true; el.classList.add('flipped'); flipped.push(i);
  if(flipped.length===2){ locked=true; moves++; document.getElementById('movesDisp').textContent=moves; checkMatch(); }
}

function checkMatch(){
  const [a,b]=flipped;
  if(cards[a].sym===cards[b].sym){
    cards[a].matched=cards[b].matched=true;
    cards[a].el.classList.add('matched'); cards[b].el.classList.add('matched');
    pairs++; document.getElementById('pairsDisp').textContent=pairs;
    flipped=[]; locked=false;
    if(pairs===totalPairs) setTimeout(win,400);
  } else {
    setTimeout(()=>{
      cards[a].flipped=cards[b].flipped=false;
      cards[a].el.classList.remove('flipped'); cards[b].el.classList.remove('flipped');
      flipped=[]; locked=false;
    },900);
  }
}

function win(){
  clearInterval(timerInt);
  const m=Math.floor(timerSec/60),s=timerSec%60;
  const timeStr=`${m}:${s.toString().padStart(2,'0')}`;
  const efficiency=Math.round((totalPairs/moves)*100);
  document.getElementById('winMsg').textContent=`${totalPairs} pairs В· ${moves} moves В· ${efficiency}% efficiency В· ${timeStr}`;

  const key=`mm_best_${gridSize}`;
  const prev=parseInt(localStorage.getItem(key)||'0',10);
  const bestEl=document.getElementById('winBest');
  if(!prev||timerSec<prev){
    localStorage.setItem(key,timerSec);
    bestEl.innerHTML=`рҹҘҮ New best for ${gridSize}: <span>${timeStr}</span>`;
  } else {
    const pm=Math.floor(prev/60),ps=prev%60;
    bestEl.innerHTML=`Best for ${gridSize}: <span>${pm}:${ps.toString().padStart(2,'0')}</span>`;
  }
  document.getElementById('winPanel').classList.add('show');
}

function mmShare(){
  const msg=document.getElementById('winMsg').textContent;
  const text=`рҹғҸ Memory Match вҖ” ${msg}\ncosmicgameshub.com/games/memory-match`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('mmShareBtn');
    btn.textContent='вң“ Copied!'; setTimeout(()=>btn.textContent='рҹ“Ӣ Share',1800);
  }).catch(()=>{ prompt('Copy this:',text); });
}

document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); theme=btn.dataset.theme; startGame(); });
});
document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); gridSize=btn.dataset.size; startGame(); });
});
document.getElementById('hamburger').addEventListener('click',function(){
  document.getElementById('navLinks').classList.toggle('open');
  this.setAttribute('aria-expanded',document.getElementById('navLinks').classList.contains('open'));
});

startGame();
</script>
<script src="/global.js" defer></script>
</body>
</html>
