<script>
const CONFIGS = {
  easy:   { rows:9,  cols:9,  mines:10 },
  medium: { rows:16, cols:16, mines:40 },
  hard:   { rows:16, cols:30, mines:99 },
};

let cfg, grid, revealed, flagged, minesLeft, timerSec, timerInt, firstClick, gameOver;
let diff = 'easy';

function initGame(d) {
  if(d) diff=d;
  cfg = CONFIGS[diff];
  grid     = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(0));
  revealed = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(false));
  flagged  = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(false));
  minesLeft = cfg.mines; firstClick=true; gameOver=false;
  clearInterval(timerInt); timerSec=0;
  document.getElementById('timerDisp').textContent='0';
  document.getElementById('mineCount').textContent=cfg.mines;
  document.getElementById('faceBtn').textContent='🙂';
  document.getElementById('msResult').classList.remove('show');
  renderGrid();
}

function placeMines(safeR, safeC) {
  let placed=0;
  while(placed<cfg.mines){
    const r=Math.floor(Math.random()*cfg.rows), c=Math.floor(Math.random()*cfg.cols);
    if(grid[r][c]===-1) continue;
    if(Math.abs(r-safeR)<=1&&Math.abs(c-safeC)<=1) continue;
    grid[r][c]=-1; placed++;
  }
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++) {
    if(grid[r][c]===-1) continue;
    let count=0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<cfg.rows&&nc>=0&&nc<cfg.cols&&grid[nr][nc]===-1) count++;
    }
    grid[r][c]=count;
  }
}

function renderGrid() {
  const el=document.getElementById('msGrid');
  const cellSize = Math.min(Math.floor((Math.min(window.innerWidth-32, 600))/cfg.cols), 38);
  el.style.gridTemplateColumns=`repeat(${cfg.cols},${cellSize}px)`;
  el.innerHTML='';
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++){
    const cell=document.createElement('div');
    cell.className='ms-cell';
    cell.style.width=cell.style.height=cellSize+'px';
    cell.style.fontSize=Math.max(10,cellSize*0.5)+'px';
    if(revealed[r][c]){
      cell.classList.add('revealed');
      if(grid[r][c]===-1){ cell.classList.add('mine-reveal'); cell.textContent='☄️'; }
      else if(grid[r][c]>0){ cell.textContent=grid[r][c]; cell.classList.add('n'+grid[r][c]); }
    } else if(flagged[r][c]){
      cell.classList.add('flagged'); cell.textContent='🚩';
    } else {
      cell.style.background='';
    }
    cell.addEventListener('click',()=>handleClick(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();handleRightClick(r,c);});
    cell.addEventListener('touchstart',handleTouchStart,{passive:true});
    cell.addEventListener('touchend',e=>handleTouchEnd(e,r,c));
    cell._r=r; cell._c=c;
    el.appendChild(cell);
  }
}

function handleClick(r,c){
  if(gameOver||flagged[r][c]||revealed[r][c]) return;
  if(firstClick){ firstClick=false; placeMines(r,c); timerInt=setInterval(()=>{timerSec++;document.getElementById('timerDisp').textContent=timerSec;},1000); }
  if(grid[r][c]===-1){ explode(r,c); return; }
  flood(r,c); renderGrid(); checkWin();
}

function flood(r,c){
  if(r<0||r>=cfg.rows||c<0||c>=cfg.cols||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c]=true;
  if(grid[r][c]===0) for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) flood(r+dr,c+dc);
}

function handleRightClick(r,c){
  if(gameOver||revealed[r][c]) return;
  flagged[r][c]=!flagged[r][c];
  minesLeft+=flagged[r][c]?-1:1;
  document.getElementById('mineCount').textContent=minesLeft;
  renderGrid();
}

let touchTimer=null;
function handleTouchStart(){ touchTimer=setTimeout(()=>{ touchTimer=null; },500); }
function handleTouchEnd(e,r,c){ if(touchTimer===null){ e.preventDefault(); handleRightClick(r,c); } else { clearTimeout(touchTimer); touchTimer=null; } }

function explode(r,c){
  gameOver=true; clearInterval(timerInt);
  revealed[r][c]=true;
  for(let i=0;i<cfg.rows;i++) for(let j=0;j<cfg.cols;j++) if(grid[i][j]===-1) revealed[i][j]=true;
  document.getElementById('faceBtn').textContent='😵';
  renderGrid();
  const explCell=document.querySelectorAll('.ms-cell')[r*cfg.cols+c];
  if(explCell) explCell.classList.add('exploded');
  showResult(false);
}

function checkWin(){
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++) if(grid[r][c]!==-1&&!revealed[r][c]) return;
  gameOver=true; clearInterval(timerInt);
  document.getElementById('faceBtn').textContent='😎';
  showResult(true);
}

function showResult(win){
  const panel=document.getElementById('msResult');
  document.getElementById('resIcon').textContent  = win?'🏆':'☄️';
  document.getElementById('resTitle').textContent = win?'Field Cleared!':'Meteor Strike!';
  document.getElementById('resMsg').textContent   = win
    ? `Cleared in ${timerSec}s on ${diff}.`
    : `You hit a meteor on ${diff}. Try again!`;

  const bestEl=document.getElementById('resBest');
  if(win){
    const key=`ms_best_${diff}`;
    const prev=parseInt(localStorage.getItem(key)||'0',10);
    if(!prev||timerSec<prev){
      localStorage.setItem(key,timerSec);
      bestEl.innerHTML=`🥇 New best for ${diff}: <span>${timerSec}s</span>`;
    } else {
      bestEl.innerHTML=`Best for ${diff}: <span>${prev}s</span>`;
    }
    bestEl.style.display='block';
  } else {
    const prev=parseInt(localStorage.getItem(`ms_best_${diff}`)||'0',10);
    if(prev){ bestEl.innerHTML=`Your best for ${diff}: <span>${prev}s</span>`; bestEl.style.display='block'; }
    else bestEl.style.display='none';
  }
  panel.classList.add('show');
}

function shareResult(){
  const won=document.getElementById('resTitle').textContent==='Field Cleared!';
  const text=won
    ?`☄️ Cosmic Minesweeper — Cleared ${diff} in ${timerSec}s!\ncosmicgameshub.com/games/minesweeper`
    :`☄️ Cosmic Minesweeper — Hit a meteor on ${diff}!\ncosmicgameshub.com/games/minesweeper`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('shareBtn');
    btn.textContent='✓ Copied!'; setTimeout(()=>btn.textContent='📋 Share',1800);
  }).catch(()=>{ prompt('Copy this:',text); });
}

document.querySelectorAll('.difficulty-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); initGame(btn.dataset.d);
  });
});
document.getElementById('hamburger').addEventListener('click',function(){
  document.getElementById('navLinks').classList.toggle('open');
  this.setAttribute('aria-expanded',document.getElementById('navLinks').classList.contains('open'));
});
window.addEventListener('resize',()=>{ if(!gameOver&&!firstClick) renderGrid(); });

initGame();
</script>
<script src="/global.js" defer></script>
